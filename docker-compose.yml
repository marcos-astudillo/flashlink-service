services:
  postgres:
    image: postgres:15
    container_name: flashlink_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flashlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flashlink_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: